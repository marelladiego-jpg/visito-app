<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visito - Assistente di Viaggio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>✈️ Visito</h1>
            <p>Il tuo pianificatore di itinerari intelligente</p>
            <button id="api-btn" style="margin-top: 10px; padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 5px; border: none; background: #ffffff33; color: white;">🔑 Configura Chiave API</button>
        </div>
        <div id="chat-box" class="chat-box"></div>
        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Scrivi una città o una destinazione...">
            <button id="send-btn">Invia</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
